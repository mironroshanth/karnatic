    <script>
        function convert() {
            const westernNotation = document.getElementById("western-notation").value;
            let letterNotation = "";

            // Simple conversion logic (you can improve this)
            for (let i = 0; i < westernNotation.length; i++) {
                const note = westernNotation[i];
                switch (note) {
                    case "C":
                        letterNotation += "ஸ-ஸட்ஜம் ";
                        break;
                    case "C#":
                        letterNotation += "ரி1-சுத்த ரிஷபம் ";
                        break;
                     case "Db":
                        letterNotation += "ரி1-ுத்த ரிஷபம் ";
                        break;   
                     case "D":
                        letterNotation += "ரி2-சதுஸ்ருதி ரிஷபம் ";
                        break;
                     case "D#":
                        letterNotation += "க1-சுத்த காந்தாரம்";
                        break;   
                    case "Eb":
                        letterNotation += "க1-சுத்த காந்தாரம்";
                        break;
                        case "E":
                        letterNotation += "க2-அந்தர காந்தாரம்";
                        break;
                    case "F":
                        letterNotation += "ம1-சுத்த மத்திமம் ";
                        break;
                    case "F#":
                        letterNotation += "ம2-பிரதி மத்திமம்";
                        break;
                     case "Gb":
                        letterNotation += "ம2-பிரதி மத்திமம்";
                        break;
                        case "G":
                        letterNotation += "ப-பஞ்சமம் ";
                        break;
                     case "G#":
                        letterNotation += "த1-சுத்த தைவதம்";
                        break;
                        case "Ab":
                        letterNotation += "த1-சுத்த தைவதம்";
                        break;
                     case "A":
                        letterNotation += "த2-சதுஸ்ருதி தைவதம்";
                        break;
                        case "A#":
                        letterNotation += "நி1-கைசிகி நிஷாதம்";
                        break;
                     case "Bb":
                        letterNotation += "நி1-கைசிகி நிஷாதம்";
                        break;
                        case "B":
                        letterNotation += "நி2-காகலி நிஷாதம் ";
                        break;
                     
                    // ... Add more cases for other notes
                }
            }

            document.getElementById("letter-notation").textContent = letterNotation;
        }
    </script>
